---
name: "Gemini Terminal"
description: "Terminal interface for Google's Gemini CLI with persistent auth and packages"
version: "2.4.19"
slug: "gemini_terminal"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64
  - armv7

# External resources
url: "https://github.com/oded996/gemini-cli-home-assistant-addons"

# Web interface configuration
ingress: true
ingress_port: 7682
panel_icon: mdi:account-circle-outline
panel_title: "Gemini Terminal"
panel_admin: true

# Port configuration
ports:
  7682/tcp: 7682
ports_description:
  7682/tcp: "Web terminal (not required for ingress)"

# Add-on configuration options
options:
  gemini_api_key: ""
  gemini_debug: false
  gemini_yolo: false
  auto_launch_gemini: true
  ha_smart_context: true
  enable_ha_mcp: true
  persistent_apk_packages: []
  persistent_pip_packages: []
schema:
  gemini_api_key: password?
  gemini_debug: bool?
  gemini_yolo: bool?
  auto_launch_gemini: bool?
  ha_smart_context: bool?
  enable_ha_mcp: bool?
  persistent_apk_packages:
    - str
  persistent_pip_packages:
    - str

# Volume mappings for file access
map:
  - config:rw    # Access to Home Assistant configuration files

# API access for Home Assistant integration
hassio_api: true
hassio_role: admin
homeassistant_api: true
auth_api: true

# Service startup configuration
startup: services

# Resource management
memory: 4G
cpu: 4.0

# Web UI access URL
webui: http://[HOST]:[PORT:7682]/
